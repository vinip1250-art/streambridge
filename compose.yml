services:
  streambridge:
    build: .
    container_name: streambridge
    restart: unless-stopped
    ports:
      - "7005:7005"
    environment:
      PORT: "7005"
      NODE_ENV: "production"
      CATALOG_CACHE_TTL: "300000"   # 5 min
      META_CACHE_TTL: "300000"      # 5 min
      STREAM_CACHE_TTL: "30000"     # 30 s
      HEALTH_CACHE_TTL: "30000"     # 30 s
    healthcheck:
      test: ["CMD", "node", "-e",
        "fetch('http://localhost:7005/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
